# Production profile — all sensitive values must be provided via environment variables.
# Activate with: SPRING_PROFILES_ACTIVE=prod
#
# Required environment variables:
#   DB_URL                    - JDBC URL, e.g. jdbc:postgresql://host:5432/instagram_catalog
#   DB_USERNAME               - Database user
#   DB_PASSWORD               - Database password
#   ADMIN_USERNAME            - HTTP Basic admin username
#   ADMIN_PASSWORD            - HTTP Basic admin password
#   CORS_ALLOWED_ORIGIN_PROD  - CloudFront domain, e.g. https://dXXXXXX.cloudfront.net

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

cors.allowed-origin.prod=${CORS_ALLOWED_ORIGIN_PROD}
