spring.datasource.url=jdbc:postgresql://localhost:5432/instagram_catalog
spring.datasource.username=catalog_user
spring.datasource.password=catalog_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Admin credentials (override via environment variables in production)
admin.username=admin
admin.password=changeme

# CORS allowed origins (override CORS_ALLOWED_ORIGIN_PROD in production)
cors.allowed-origin.dev=http://localhost:5173
cors.allowed-origin.prod=${CORS_ALLOWED_ORIGIN_PROD:https://placeholder.cloudfront.net}

# Actuator — expose only the health endpoint (required for ECS container health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
