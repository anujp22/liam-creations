spring.datasource.url=jdbc:postgresql://localhost:5432/instagram_catalog
spring.datasource.username=catalog_user
spring.datasource.password=catalog_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Cap client-supplied page size so ?size= can't pull the whole table in one query.
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=20

# Admin credentials (override via environment variables in production)
# Dummy dev login -> username: admin   password: admin123
admin.username=admin
admin.password=admin123

# Local image uploads (dev). Served at /uploads/**. Override app.uploads.dir in prod (or swap StorageService for S3).
app.uploads.dir=${APP_UPLOADS_DIR:uploads}
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=40MB

# CORS allowed origins (override CORS_ALLOWED_ORIGIN_PROD in production)
cors.allowed-origin.dev=http://localhost:5173
cors.allowed-origin.prod=${CORS_ALLOWED_ORIGIN_PROD:https://placeholder.cloudfront.net}

# Actuator — expose only the health endpoint (required for ECS container health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Include the per-request correlation id (set by RequestLoggingFilter) in every log line.
logging.pattern.level=%5p [%X{requestId:-}]
